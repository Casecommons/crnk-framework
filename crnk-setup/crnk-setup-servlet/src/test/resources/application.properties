# The reactive servlet test application (ReactiveServletTestApplication) has a circular bean dependency
# between the @Configuration class (which @Autowires CrnkBoot) and the crnkBoot/asyncCrnkServlet beans it
# declares. Spring Boot prohibits circular references by default since 2.6; re-enable them for these tests.
spring.main.allow-circular-references=true

# crnk encodes QuerySpec filters / sparse fieldsets using JSON:API bracket syntax (e.g. filter[name]=...,
# fields[tasks]=...). Tomcat 10 (Spring Boot 4) rejects unencoded square brackets in the request target
# with HTTP 400 by default, so explicitly allow them.
server.tomcat.relaxed-query-chars=[,]
