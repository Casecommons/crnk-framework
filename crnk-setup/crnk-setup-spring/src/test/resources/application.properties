crnk.resourcePackages=io.crnk.test.mock.repository
crnk.domainName=http://localhost:8080
crnk.path-prefix=/api

crnk.jpa.enabled=true
crnk.security.enabled=false

# crnk encodes QuerySpec filters using the JSON:API bracket syntax (e.g. filter[name][EQ]=...). Tomcat 10
# (Spring Boot 4) rejects unencoded square brackets in the request target with HTTP 400 by default, so
# explicitly allow them.
server.tomcat.relaxed-query-chars=[,]